name: Daily reminder push

on:
  schedule:
    - cron: "20 11 * * *"   # 台灣時間 20:00
    - cron: "20 13 * * *"   # 台灣時間 22:00
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Auth to Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # 讀取 Firestore 判斷依據
      # =========================
      - name: Read pendingCount & dayToken
        id: read_pending
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          UID: ${{ secrets.FIREBASE_UID }}
        run: |
          set -euo pipefail

          ACCESS_TOKEN="$(gcloud auth application-default print-access-token)"
          DOC_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/daily/${UID}"

          HTTP_STATUS=$(curl -sS -o doc.json -w "%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json; charset=UTF-8" \
            "$DOC_URL")

          echo "HTTP_STATUS=${HTTP_STATUS}"
          head -n 60 doc.json || true

          if [ "$HTTP_STATUS" != "200" ] || [ ! -s doc.json ]; then
            echo "pendingCount=" >> "$GITHUB_OUTPUT"
            echo "dayToken="     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 防呆：非 JSON
          if ! head -c1 doc.json | grep -q '{'; then echo '{}' > doc.json; fi

          PENDING_COUNT=$(jq -r 'try .fields.meta.mapValue.fields.pendingCount.integerValue // empty' doc.json)
          DAYTOKEN=$(jq -r 'try .fields.meta.mapValue.fields.dayToken.stringValue // empty' doc.json)

          echo "pendingCount=${PENDING_COUNT}" >> "$GITHUB_OUTPUT"
          echo "dayToken=${DAYTOKEN}"         >> "$GITHUB_OUTPUT"

          echo "DEBUG -> pendingCount(raw)=${PENDING_COUNT}"
          echo "DEBUG -> dayToken(raw)=${DAYTOKEN}"

      # =========================
      # 判斷是否要推播
      # =========================
      - name: Decide to push?
        id: decide
        run: |
          set -euo pipefail

          PENDING_COUNT="${{ steps.read_pending.outputs.pendingCount }}"
          DT="${{ steps.read_pending.outputs.dayToken }}"
          TODAY="$(TZ=Asia/Taipei date +%Y-%m-%d)"
          TS="$(TZ=Asia/Taipei date +%Y%m%d-%H%M)"

          echo "ts=${TS}" >> "$GITHUB_OUTPUT"
          echo "Today=${TODAY}, pendingCount='${PENDING_COUNT}', dayToken='${DT}'"

          # 缺資料直接跳過
          if [ -z "${DT}" ] || [ -z "${PENDING_COUNT}" ]; then
            echo "do_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 非數字歸零
          if ! [[ "$PENDING_COUNT" =~ ^[0-9]+$ ]]; then
            PENDING_COUNT=0
          fi

          # 非今天跳過
          if [ "$DT" != "$TODAY" ]; then
            echo "do_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 已完成（0）跳過
          if [ "$PENDING_COUNT" -le 0 ]; then
            echo "do_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "do_send=true" >> "$GITHUB_OUTPUT"

      # =========================
      # 讀 token
      # =========================
      - name: List device tokens
        if: steps.decide.outputs.do_send == 'true'
        id: list_tokens
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          UID: ${{ secrets.FIREBASE_UID }}
        run: |
          set -euo pipefail

          ACCESS_TOKEN="$(gcloud auth application-default print-access-token)"
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents"
          PARENT="${BASE}/daily/${UID}/tokens"
          PAGE_TOKEN=""
          : > tokens.txt

          while :; do
            URL="${PARENT}"
            if [ -n "$PAGE_TOKEN" ]; then URL="${URL}?pageToken=${PAGE_TOKEN}"; fi

            HTTP_STATUS=$(curl -sS -o tokens.json -w "%{http_code}" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json; charset=UTF-8" \
              "$URL")

            echo "LIST TOKENS http=${HTTP_STATUS}"

            if [ "$HTTP_STATUS" != "200" ] || [ ! -s tokens.json ]; then
              break
            fi

            if ! head -c1 tokens.json | grep -q '{'; then echo '{}' > tokens.json; fi

            jq -r 'try .documents[]?.name | capture("(?<id>[^/]+)$").id // empty' tokens.json >> tokens.txt
            PAGE_TOKEN=$(jq -r 'try .nextPageToken // empty' tokens.json)
            [ -z "$PAGE_TOKEN" ] && break
          done

          echo "---- tokens ----"
          cat tokens.txt || true

      # =========================
      # 發送 FCM
      # =========================
      - name: Send FCM
        if: steps.decide.outputs.do_send == 'true'
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          UID: ${{ secrets.FIREBASE_UID }}
        run: |
          set -euo pipefail

          ACCESS_TOKEN="$(gcloud auth application-default print-access-token)"
          TS="${{ steps.decide.outputs.ts }}"
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents"

          if [ ! -s tokens.txt ]; then
            echo "No tokens."
            exit 0
          fi

          while IFS= read -r TOK; do
            [ -z "$TOK" ] && continue

            jq -n \
              --arg tok "$TOK" \
              --arg ts "$TS" \
              '{
                message:{
                  token:$tok,
                  notification:{title:"每日任務",body:"你還有尚未完成的每日任務！"},
                  data:{title:"每日任務",body:"你還有尚未完成的每日任務！",ts:$ts},
                  webpush:{
                    headers:{Urgency:"high",TTL:"3600"},
                    fcm_options:{link:"https://eyvind95.github.io/hello/apps/ledger/daily.html"},
                    notification:{
                      icon:"https://eyvind95.github.io/hello/apps/ledger/6.png",
                      badge:"https://eyvind95.github.io/hello/apps/ledger/8.png",
                      tag:("daily-reminder-"+$ts)
                    }
                  }
                }
              }' > payload.json

            HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json; charset=UTF-8" \
              "https://fcm.googleapis.com/v1/projects/${PROJECT_ID}/messages:send" \
              -d @payload.json)

            echo "[${TOK}] HTTP_STATUS=${HTTP_STATUS}"
            jq -r 'try .name // .error.message // empty' response.json || true

          done < tokens.txt

      - name: Skip push (no need)
        if: steps.decide.outputs.do_send != 'true'
        run: echo 'Skip push：非今日或 pendingCount==0 或缺資料'
